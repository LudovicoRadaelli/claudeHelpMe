<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script language="javascript" type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.min.js"></script>
    <link rel="stylesheet" href="../../css/style.css">
    <title>Compiti per casa</title>
</head>

<style>
    body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
        text-align: center;
    }

    .hidden {
        display: none;
    }

    .card {
        border: 2px solid #333;
        padding: 40px;
        border-radius: 8px;
        margin: 20px 0;
        min-height: 100px;
        cursor: pointer;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-group {
        display: flex;
        justify-content: space-around;
        margin-top: 20px;
    }

    button {
        padding: 10px 20px;
        font-size: 1rem;
        cursor: pointer;
    }

    .quality-btn {
        background: #f0f0f0;
        border: 1px solid #ccc;
    }
</style>

<body>
    <h1>Compiti per casa</h1>

    <br>

    <!-- SEZIONE 1: LOGIN -->
    <div id="login-screen">
        <h2>Inserisci il tuo Username</h2>
        <input type="text" id="username-input" placeholder="Es. utente_01">
        <button onclick="login()">Accedi</button>
    </div>

    <!-- SEZIONE 2: DASHBOARD E FLASHCARD -->
    <div id="app-screen" class="hidden">
        <h2 id="welcome-msg"></h2>
        <div id="card-container">
            <div id="flashcard" class="card" onclick="flipCard()">Caricamento...</div>
            <div id="answer-actions" class="hidden">
                <p>Valuta la tua risposta (0 = Buio totale, 5 = Facilissimo):</p>
                <div class="btn-group">
                    <button class="quality-btn" onclick="submitFeedback(0)">0</button>
                    <button class="quality-btn" onclick="submitFeedback(1)">1</button>
                    <button class="quality-btn" onclick="submitFeedback(2)">2</button>
                    <button class="quality-btn" onclick="submitFeedback(3)">3</button>
                    <button class="quality-btn" onclick="submitFeedback(4)">4</button>
                    <button class="quality-btn" onclick="submitFeedback(5)">5</button>
                </div>
            </div>
            <div id="show-btn-container">
                <button onclick="flipCard()">Mostra Risposta</button>
            </div>
        </div>
        <div id="empty-msg" class="hidden">
            <p>Ottimo lavoro! Hai completato tutte le carte per ora.</p>
        </div>
        <br><br>
        <button onclick="logout()">Cambia Utente</button>
    </div>

    <script>
        // Database iniziale delle carte (le risposte corrette/domande)
        const DEFAULT_CARDS = [
            { id: 1, front: "Qual è la capitale della Francia?", back: "Parigi" },
            { id: 2, front: "Quanto fa 2 + 2?", back: "4" },
            { id: 3, front: "Qual è la formula chimica dell'acqua?", back: "H2O" }
        ];

        let currentUser = "";
        let userProgress = [];
        let currentCard = null;
        let isShowingBack = false;

        function login() {
            const user = document.getElementById('username-input').value.trim();
            if (!user) return alert("Inserisci uno username");

            currentUser = user;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `Utente: ${currentUser}`;

            loadUserData();
            showNextCard();
        }

        function logout() {
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('username-input').value = "";
        }

        function loadUserData() {
            // Cerca i dati salvati nel browser per questo specifico utente
            const saved = localStorage.getItem(`flashcards_${currentUser}`);
            if (saved) {
                userProgress = JSON.parse(saved);
            } else {
                // Se è un nuovo utente, inizializza le carte con i parametri SM-2 di base
                userProgress = DEFAULT_CARDS.map(c => ({
                    ...c,
                    interval: 0,    // Giorni di attesa
                    repetition: 0,  // Numero di ripetizioni consecutive riuscite
                    efactor: 2.5,   // Fattore di facilità iniziale
                    dueDate: Date.now() // Subito disponibile
                }));
                saveUserData();
            }
        }

        function saveUserData() {
            localStorage.setItem(`flashcards_${currentUser}`, JSON.stringify(userProgress));
        }

        function showNextCard() {
            const now = Date.now();
            // Filtra le carte che sono scadute o pronte per essere ripassate
            const dueCards = userProgress.filter(c => c.dueDate <= now);

            if (dueCards.length === 0) {
                document.getElementById('card-container').classList.add('hidden');
                document.getElementById('empty-msg').classList.remove('hidden');
                currentCard = null;
                return;
            }

            document.getElementById('card-container').classList.remove('hidden');
            document.getElementById('empty-msg').classList.add('hidden');

            // Prende la prima carta disponibile
            currentCard = dueCards[0];
            isShowingBack = false;

            document.getElementById('flashcard').innerText = currentCard.front;
            document.getElementById('answer-actions').classList.add('hidden');
            document.getElementById('show-btn-container').classList.remove('hidden');
        }

        function flipCard() {
            if (!currentCard) return;
            isShowingBack = !isShowingBack;
            document.getElementById('flashcard').innerText = isShowingBack ? currentCard.back : currentCard.front;

            if (isShowingBack) {
                document.getElementById('answer-actions').classList.remove('hidden');
                document.getElementById('show-btn-container').classList.add('hidden');
            }
        }

        // Algoritmo di Ripetizione Spaziata SM-2
        function submitFeedback(q) {
            let item = userProgress.find(c => c.id === currentCard.id);

            if (q >= 3) {
                if (item.repetition === 0) {
                    item.interval = 1;
                } else if (item.repetition === 1) {
                    item.interval = 6;
                } else {
                    item.interval = Math.ceil(item.interval * item.efactor);
                }
                item.repetition++;
            } else {
                item.repetition = 0;
                item.interval = 1;
            }

            // Calcolo del nuovo E-Factor (Fattore di facilità)
            item.efactor = item.efactor + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));
            if (item.efactor < 1.3) item.efactor = 1.3;

            // Calcola la data futura in base ai giorni di intervallo
            const targetDate = new Date();
            targetDate.setDate(targetDate.getDate() + item.interval);
            // Per scopi di test immediato puoi usare i minuti invece dei giorni scommentando la riga sotto:
            // targetDate.setMinutes(targetDate.getMinutes() + item.interval); 

            item.dueDate = targetDate.getTime();

            saveUserData();
            showNextCard();
        }
    </script>





    <br>
    <br>

</body>

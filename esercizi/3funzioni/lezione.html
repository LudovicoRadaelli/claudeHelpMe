<body>
    
    \[
    A(x + h) - A(x) \approx h \cdot f(x)    
    \]
    \[
    \dfrac{A(x + h) - A(x)}{h} \approx f(x)    
    \]
    \[
    A'(x) = f(x)    
    \]
    \[
    \int \, A'(x) \,\, dx = \int \, f(x) \,\, dx
    \]
    \[
    A(x) = \int \, f(x) \,\, dx
    \]
